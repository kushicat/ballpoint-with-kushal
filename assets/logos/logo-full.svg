<!--
  ============================================================
  BALLPOINT WITH KUSHAL — FULL LOGO (icon + wordmark)
  ------------------------------------------------------------
  Concept: a minimal ballpoint pen tip merged with a growth arrow.
  Use this version in the navbar and footer.
  Colours are driven by the brand gradient (blue #2563EB -> green #10B981).
  To recolour: edit the two <stop> values inside <linearGradient id="bpkGrad">.
  ============================================================
-->
<svg width="240" height="56" viewBox="0 0 240 56" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Ballpoint with Kushal">
  <defs>
    <linearGradient id="bpkGrad" x1="0" y1="0" x2="48" y2="48" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#2563EB"/>
      <stop offset="1" stop-color="#10B981"/>
    </linearGradient>
  </defs>

  <!-- ICON: pen body angling up like an arrow, with a nib tip -->
  <g transform="translate(4,4)">
    <!-- pen barrel / arrow shaft -->
    <path d="M8 40 L34 14" stroke="url(#bpkGrad)" stroke-width="6" stroke-linecap="round"/>
    <!-- nib (pen tip triangle) -->
    <path d="M34 14 L44 4 L40 18 Z" fill="url(#bpkGrad)"/>
    <!-- ballpoint ball -->
    <circle cx="9" cy="41" r="4.5" fill="#0F172A"/>
    <!-- growth arrowhead echoing the nib direction -->
    <path d="M44 4 L44 16 M44 4 L32 4" stroke="url(#bpkGrad)" stroke-width="4" stroke-linecap="round"/>
  </g>

  <!-- WORDMARK -->
  <text x="62" y="26" font-family="'Plus Jakarta Sans','Manrope',sans-serif" font-size="20" font-weight="800" fill="#0F172A" letter-spacing="-0.5">Ballpoint</text>
  <text x="62" y="46" font-family="'Inter',sans-serif" font-size="13" font-weight="600" fill="#2563EB" letter-spacing="2">WITH KUSHAL</text>
</svg>
